<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Equipos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    h3 { margin-top: 20px; }
    .btn { margin-right: 10px; }
    .form-section { background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .table-section { background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="container">

  <!-- Tabla de registros -->
  <div class="table-section">
    <h3>Registros de equipos</h3>
    <table id="tablaEquipos" class="table table-striped table-hover">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Docente</th>
          <th>Asignatura</th>
          <th>Equipo</th>
          <th>Hora Inicio</th>
          <th>Hora Finaliza</th>
          <th>Ubicación</th>
          <th>Observaciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Ejemplo de registros -->
        <tr onclick="cargarFormulario(this)">
          <td>1</td><td>2026-04-07</td><td>Juan Pérez</td><td>Matemática</td>
          <td>Proyector 1</td><td>08:00</td><td>09:30</td><td>Aula 101</td><td>Ninguna</td>
        </tr>
        <tr onclick="cargarFormulario(this)">
          <td>2</td><td>2026-04-07</td><td>María López</td><td>Física</td>
          <td>Laptop 2</td><td>10:00</td><td>11:30</td><td>Aula 102</td><td>Traer cables</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Formulario CRUD -->
  <div class="form-section mt-4">
    <h3>Formulario de registro</h3>
    <form id="formEquipos">
      <input type="hidden" id="id" name="id">

      <div class="row mb-3">
        <div class="col">
          <label>Fecha</label>
          <input type="date" class="form-control" id="fecha" name="fecha" required>
        </div>
        <div class="col">
          <label>Docente</label>
          <input type="text" class="form-control" id="docente" name="docente" required>
        </div>
        <div class="col">
          <label>Asignatura</label>
          <input type="text" class="form-control" id="asignatura" name="asignatura" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label>Equipo</label>
          <input type="text" class="form-control" id="equipo" name="equipo" required>
        </div>
        <div class="col">
          <label>Hora inicio</label>
          <input type="time" class="form-control" id="hora_inicio" name="hora_inicio" required>
        </div>
        <div class="col">
          <label>Hora finaliza</label>
          <input type="time" class="form-control" id="hora_finaliza" name="hora_finaliza" required>
        </div>
      </div>

      <div class="mb-3">
        <label>Ubicación</label>
        <input type="text" class="form-control" id="ubicacion" name="ubicacion">
      </div>

      <div class="mb-3">
        <label>Observaciones</label>
        <textarea class="form-control" id="observaciones" name="observaciones"></textarea>
      </div>

      <button type="button" class="btn btn-success" onclick="guardar()">Guardar</button>
      <button type="button" class="btn btn-primary" onclick="actualizar()">Actualizar</button>
      <button type="button" class="btn btn-danger" onclick="eliminar()">Eliminar</button>
    </form>
  </div>

  <script>
    // Cargar datos de la fila seleccionada en el formulario
    function cargarFormulario(fila) {
      let celdas = fila.getElementsByTagName("td");
      document.getElementById("id").value = celdas[0].innerText;
      document.getElementById("fecha").value = celdas[1].innerText;
      document.getElementById("docente").value = celdas[2].innerText;
      document.getElementById("asignatura").value = celdas[3].innerText;
      document.getElementById("equipo").value = celdas[4].innerText;
      document.getElementById("hora_inicio").value = celdas[5].innerText;
      document.getElementById("hora_finaliza").value = celdas[6].innerText;
      document.getElementById("ubicacion").value = celdas[7].innerText;
      document.getElementById("observaciones").value = celdas[8].innerText;
    }

    // Funciones CRUD (ejemplo, aquí iría conexión a BD)
    function guardar() { alert("Registro guardado"); }
    function actualizar() { alert("Registro actualizado"); }
    function eliminar() { alert("Registro eliminado"); }
  </script>
</body>
</html>
